<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Test Live Stream</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #000;
        color: #faf3e8;
        font-family: Georgia, "Times New Roman", serif;
      }

      .shell {
        display: flex;
        height: 100%;
        flex-direction: column;
      }

      .badge {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: rgba(92, 10, 26, 0.95);
        border-bottom: 1px solid rgba(212, 175, 55, 0.35);
        font-size: 0.75rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }

      .dot {
        width: 0.5rem;
        height: 0.5rem;
        border-radius: 999px;
        background: #f87171;
        animation: pulse 1.2s ease-in-out infinite;
      }

      video {
        flex: 1;
        width: 100%;
        min-height: 0;
        object-fit: cover;
        background: #000;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.35;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="badge">
        <span class="dot"></span>
        Dummy test stream
      </div>
      <video id="stream" controls autoplay muted loop playsinline>
        <source
          src="https://test-videos.co.uk/vids/bigbuckbunny/mp4/h264/360/Big_Buck_Bunny_360_10s_1MB.mp4"
          type="video/mp4"
        />
      </video>
    </div>
    <script>
      const video = document.getElementById("stream");
      video.play().catch(() => {
        video.controls = true;
      });
    </script>
  </body>
</html>
